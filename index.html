<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giovane | Digital Card</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: #161b22;
            padding: 40px;
            border-radius: 30px;
            border: 2px solid #4169E1;
            text-align: center;
            width: 320px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }
        img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #4169E1;
            object-fit: cover;
        }
        h1 { color: #4169E1; margin: 20px 0 5px 0; font-size: 28px; }
        p { color: #8b949e; margin-bottom: 30px; letter-spacing: 1px; }
        .btn {
            display: block;
            background: #4169E1;
            color: white;
            padding: 12px;
            margin: 10px 0;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn:hover { background: #3152bc; transform: translateY(-3px); }
    </style>
</head>
<body>
    <div class="card">
        <!-- This automatically pulls your profile picture (the dog) -->
        <img src="https://github.com/giovdevcode.png" alt="Giovane">
        <h1>GIOVANE</h1>
        <p>ARCHITECT & DEVELOPER</p>
        <a href="https://github.com/giovdevcode" class="btn">GitHub Portfolio</a>
        <a href="https://facebook.com/banglgiovane" class="btn">Facebook</a>
        <a href="https://instagram.com/banglgiovane" class="btn">Instagram</a>
    </div>
</body>
</html>
